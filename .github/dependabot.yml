version: 2
updates:
  # Rust (API)
  - package-ecosystem: "cargo"
    directory: "/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(rust):"

  # Node.js — Web client
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(web):"

  # Node.js — Admin panel
  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(admin):"

  # Docker Compose
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(docker):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(ci):"
