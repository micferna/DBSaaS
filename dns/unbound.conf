server:
    interface: 0.0.0.0
    port: 53

    # Security
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
    val-clean-additional: yes

    # Access control — Docker networks only
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 0.0.0.0/0 refuse

    # Performance
    num-threads: 2
    msg-cache-size: 32m
    rrset-cache-size: 32m
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes

    # Wildcard zone: *.db.PLATFORM_DOMAIN -> PLATFORM_IP
    local-zone: "db.PLATFORM_DOMAIN." redirect
    local-data: "db.PLATFORM_DOMAIN. 300 IN A PLATFORM_IP"

forward-zone:
    name: "."
    forward-addr: 1.1.1.1
    forward-addr: 8.8.8.8
