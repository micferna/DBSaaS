[advisories]
ignore = [
    "RUSTSEC-2023-0071", # rsa: Marvin attack — no patched version yet
    "RUSTSEC-2025-0134", # rustls-pemfile: deprecated in favor of rustls-pki-types PemObject
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
private = { ignore = true }
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
